<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CubrePack · Pieza 2</title>
  <meta name="robots" content="noindex,nofollow">
  <style>body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;color:#383838;background:#fff}.msg{max-width:520px;padding:24px;text-align:center}.msg b{color:#dc2e2e}</style>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>
  <div class="msg" id="loading"><b>Cargando pieza 2…</b><br>Si tarda más de unos segundos, recarga la página.</div>
  <noscript>Activa JavaScript para ver esta pieza.</noscript>
  <script>
    (async function(){
      const files = [
        'p2-00.txt',
        'p2-01.txt',
        'p2-02.txt',
        'p2-03.txt',
        'p2-04.txt',
        'p2-05.txt',
        'p2-06.txt',
        'p2-07.txt',
        'p2-08.txt',
        'p2-09.txt',
        'p2-10.txt',
        'p2-11.txt'
      ];
      try {
        const parts = await Promise.all(files.map(async file => {
          const res = await fetch(file + '?v=20260623', { cache: 'no-store' });
          if (!res.ok) throw new Error('No se pudo cargar ' + file);
          return (await res.text()).trim();
        }));
        const binary = atob(parts.join(''));
        const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
        const html = new TextDecoder('utf-8').decode(pako.ungzip(bytes));
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        console.error(err);
        document.getElementById('loading').innerHTML = '<b>No se pudo cargar la pieza.</b><br>Revisa que los archivos payload estén en la raíz del repositorio.';
      }
    })();
  </script>
</body>
</html>
