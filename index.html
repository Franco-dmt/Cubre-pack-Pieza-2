<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CubrePack · Pieza 2</title>
  <meta name="robots" content="noindex,nofollow">
  <style>html,body{margin:0;width:100%;height:100%;font-family:Arial,sans-serif;color:#383838;background:#fff}.msg{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}.msg b{color:#dc2e2e}iframe{border:0;width:100%;min-height:100vh;display:block}</style>
</head>
<body>
  <div class="msg" id="loading"><span><b>Cargando pieza 2…</b><br>Si tarda más de unos segundos, recarga la página.</span></div>
  <noscript>Activa JavaScript para ver esta pieza.</noscript>
  <script>
    (async function(){
      const files = ['html-00.txt','html-01.txt','html-02.txt','html-03.txt','html-04.txt','html-05.txt','html-06.txt','html-07.txt','html-08.txt','html-09.txt','html-10.txt','html-11.txt','html-12.txt','html-13.txt'];
      try {
        const parts = await Promise.all(files.map(async file => {
          const res = await fetch(file + '?v=20260623', { cache: 'no-store' });
          if (!res.ok) throw new Error('No se pudo cargar ' + file);
          return await res.text();
        }));
        const frame = document.createElement('iframe');
        frame.srcdoc = parts.join('');
        document.body.innerHTML = '';
        document.body.appendChild(frame);
      } catch (err) {
        console.error(err);
        document.getElementById('loading').innerHTML = '<span><b>No se pudo cargar la pieza.</b><br>Revisa que los archivos html estén en la raíz del repositorio.</span>';
      }
    })();
  </script>
</body>
</html>
